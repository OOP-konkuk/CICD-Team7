name: Cppcheck Static Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  cppcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck jq

      - name: Run Cppcheck
        run: |
          cppcheck --enable=all --inconclusive --quiet --force --std=c++17 \
            --suppress=missingIncludeSystem \
            --output-file=cppcheck-report.txt \
            ./src || true

      - name: Count issues by severity
        id: count_issues
        run: |
          ERRORS=$(grep -c "error:" cppcheck-report.txt || echo 0)
          WARNINGS=$(grep -c "warning:" cppcheck-report.txt || echo 0)
          STYLE=$(grep -c "style:" cppcheck-report.txt || echo 0)
          PERFORMANCE=$(grep -c "performance:" cppcheck-report.txt || echo 0)
          TOTAL=$(wc -l < cppcheck-report.txt || echo 0)

          echo "ERRORS=$ERRORS" >> $GITHUB_OUTPUT
          echo "WARNINGS=$WARNINGS" >> $GITHUB_OUTPUT
          echo "STYLE=$STYLE" >> $GITHUB_OUTPUT
          echo "PERFORMANCE=$PERFORMANCE" >> $GITHUB_OUTPUT
          echo "TOTAL=$TOTAL" >> $GITHUB_OUTPUT

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck-report.txt

      - name: Discord 알림
        if: always()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            📝 **Cppcheck 분석 결과**: `${{ github.repository }}` - ${{ github.ref_name }}
            • Errors: ${{ steps.count_issues.outputs.ERRORS }}
            • Warnings: ${{ steps.count_issues.outputs.WARNINGS }}
            • Style issues: ${{ steps.count_issues.outputs.STYLE }}
            • Performance issues: ${{ steps.count_issues.outputs.PERFORMANCE }}
            • Total: ${{ steps.count_issues.outputs.TOTAL }}