name: Cppcheck Static Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  cppcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck jq

      - name: Run Cppcheck
        run: |
          cppcheck --enable=all --inconclusive --quiet --force --std=c++17 \
            --suppress=missingIncludeSystem \
            --output-file=cppcheck-report.txt \
            ./src || true

      - name: Count issues by severity
        id: count_issues
        run: |
          ERRORS=$(grep -c "error:" cppcheck-report.txt 2>/dev/null || true)
          WARNINGS=$(grep -c "warning:" cppcheck-report.txt 2>/dev/null || true)
          STYLE=$(grep -c "style:" cppcheck-report.txt 2>/dev/null || true)
          PERFORMANCE=$(grep -c "performance:" cppcheck-report.txt 2>/dev/null || true)
          TOTAL=$(wc -l < cppcheck-report.txt 2>/dev/null || true)

          echo "ERRORS=${ERRORS:-0}" >> $GITHUB_OUTPUT
          echo "WARNINGS=${WARNINGS:-0}" >> $GITHUB_OUTPUT
          echo "STYLE=${STYLE:-0}" >> $GITHUB_OUTPUT
          echo "PERFORMANCE=${PERFORMANCE:-0}" >> $GITHUB_OUTPUT
          echo "TOTAL=${TOTAL:-0}" >> $GITHUB_OUTPUT

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck-report.txt

      - name: Discord 성공 알림
        if: success()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: "✅ Cppcheck 분석 완료: `${{ github.repository }}` - ${{ github.ref_name }} | Errors: ${{ steps.count_issues.outputs.ERRORS }} | Warnings: ${{ steps.count_issues.outputs.WARNINGS }} | Style: ${{ steps.count_issues.outputs.STYLE }} | Performance: ${{ steps.count_issues.outputs.PERFORMANCE }} | Total: ${{ steps.count_issues.outputs.TOTAL }}"

      - name: Discord 실패 알림
        if: failure()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: "❌ Cppcheck 분석 실패: `${{ github.repository }}` - ${{ github.ref_name }} 확인 필요!"