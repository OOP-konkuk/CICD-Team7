name: Clang-Tidy Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy cmake

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          clang-tidy src/main.cpp \
            -p build \
            -- -std=c++17 > clang-tidy-report.txt 2>&1 || true

      - name: Count issues
        id: count_issues
        run: |
          WARNINGS=$(grep -c "warning:" clang-tidy-report.txt || echo 0)
          ERRORS=$(grep -c "error:" clang-tidy-report.txt || echo 0)
          TOTAL=$(wc -l < clang-tidy-report.txt || echo 0)

          echo "WARNINGS=$WARNINGS" >> $GITHUB_OUTPUT
          echo "ERRORS=$ERRORS" >> $GITHUB_OUTPUT
          echo "TOTAL=$TOTAL" >> $GITHUB_OUTPUT

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-report.txt

      - name: Discord 알림
        if: always()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🔍 **Clang-Tidy 분석 결과**: `${{ github.repository }}` - ${{ github.ref_name }}
            • Errors: ${{ steps.count_issues.outputs.ERRORS }}
            • Warnings: ${{ steps.count_issues.outputs.WARNINGS }}
            • Total: ${{ steps.count_issues.outputs.TOTAL }}