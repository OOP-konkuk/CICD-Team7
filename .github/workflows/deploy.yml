name: Build & Test & Deploy on EC2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo yum install -y lcov

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="--coverage"

      - name: Build
        run: cmake --build build

      - name: Run Google Test
        run: cd build && ctest --output-on-failure

      - name: Capture coverage
        run: |
          lcov --directory build --capture --output-file coverage.info --ignore-errors mismatch,empty
          lcov --remove coverage.info '/usr/*' '*/test/*' --output-file coverage.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          fail_ci_if_error: false

      - name: Deploy binary
        if: success()
        run: |
          mkdir -p /home/ec2-user/deployed
          cp build/oop /home/ec2-user/deployed/
          chmod +x /home/ec2-user/deployed/oop

      - name: Discord 성공 알림
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"content":"✅ 빌드/테스트/배포 성공: ${{ github.repository }} - ${{ github.ref_name }}"}' \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Discord 실패 알림
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"content":"❌ 빌드/테스트/배포 실패: ${{ github.repository }} - ${{ github.ref_name }} 확인 필요!"}' \
          ${{ secrets.DISCORD_WEBHOOK }}